<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Remote Desktop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <div class="login-icon"><i class="fa-solid fa-desktop"></i></div>
        <h1>Remote Desktop</h1>
        <p class="dim">Подключись к своему ПК</p>
        <div class="fld"><label>Адрес сервера</label><input type="text" id="inpHost" placeholder="https://xxxx.trycloudflare.com" autocapitalize="off"></div>
        <div class="fld"><label>Пароль</label><input type="password" id="inpPass" placeholder="••••••"></div>
        <button class="btn" id="btnConnect"><i class="fa-solid fa-plug"></i> Подключиться</button>
        <div class="msg" id="loginMsg"></div>
    </div>
</div>
<div class="app hidden" id="app">
    <div class="screen-view act" id="screenView">
        <div class="screen-wrap"><canvas id="screenCanvas"></canvas></div>
        <div class="touch-controls">
            <button class="touch-btn" id="btnKeyboard"><i class="fa-solid fa-keyboard"></i></button>
            <button class="touch-btn" id="btnCtrlAltDel"><i class="fa-solid fa-power-off"></i></button>
        </div>
        <div class="bottom-bar">
            <div class="bb-left"><span class="conn-dot on" id="connDot"></span><span id="connText" class="conn-text">Онлайн</span></div>
            <div class="bb-center">
                <button class="bbtn act" data-tab="screen"><i class="fa-solid fa-display"></i></button>
                <button class="bbtn" data-tab="files"><i class="fa-solid fa-folder"></i></button>
                <button class="bbtn" data-tab="terminal"><i class="fa-solid fa-terminal"></i></button>
                <button class="bbtn" data-tab="sysinfo"><i class="fa-solid fa-chart-simple"></i></button>
            </div>
            <div class="bb-right"><button class="bbtn" id="btnDisconnect"><i class="fa-solid fa-power-off"></i></button></div>
        </div>
    </div>
    <div class="panel" id="panelFiles">
        <div class="panel-head"><button class="pback" data-back="screen"><i class="fa-solid fa-arrow-left"></i></button><h2>Файлы</h2></div>
        <div class="file-bar"><button class="ctrl-btn" id="btnHome"><i class="fa-solid fa-house"></i></button><input type="text" id="filePath" class="file-path" placeholder="Путь"><button class="ctrl-btn" id="btnGo"><i class="fa-solid fa-arrow-right"></i></button></div>
        <div class="file-list" id="fileList"></div>
    </div>
    <div class="panel" id="panelTerminal">
        <div class="panel-head"><button class="pback" data-back="screen"><i class="fa-solid fa-arrow-left"></i></button><h2>Терминал</h2></div>
        <div class="term-output" id="termOutput"></div>
        <div class="term-input-row"><span class="term-prompt">$</span><input type="text" id="termInput" class="term-input" placeholder="Команда..."><button class="ctrl-btn" id="btnTermRun"><i class="fa-solid fa-play"></i></button></div>
    </div>
    <div class="panel" id="panelSysinfo">
        <div class="panel-head"><button class="pback" data-back="screen"><i class="fa-solid fa-arrow-left"></i></button><h2>Система</h2></div>
        <div class="info-grid">
            <div class="info-card"><div class="info-label">ОС</div><div class="info-value" id="infoOs">—</div></div>
            <div class="info-card"><div class="info-label">Имя ПК</div><div class="info-value" id="infoHost">—</div></div>
            <div class="info-card"><div class="info-label">Экран</div><div class="info-value" id="infoScreen">—</div></div>
            <div class="info-card"><div class="info-label">CPU</div><div class="info-value" id="infoCpu">—</div><div class="info-bar"><div class="info-bar-fill" id="barCpu"></div></div></div>
            <div class="info-card"><div class="info-label">RAM</div><div class="info-value" id="infoRam">—</div><div class="info-bar"><div class="info-bar-fill" id="barRam"></div></div></div>
            <div class="info-card"><div class="info-label">Диск</div><div class="info-value" id="infoDisk">—</div><div class="info-bar"><div class="info-bar-fill" id="barDisk"></div></div></div>
        </div>
        <button class="btn" id="btnRefresh"><i class="fa-solid fa-arrows-rotate"></i> Обновить</button>
    </div>
</div>
<div class="kb-overlay" id="kbOverlay">
    <div class="kb-panel">
        <div class="kb-head"><span>Клавиатура</span><button class="kb-close" id="kbClose"><i class="fa-solid fa-xmark"></i></button></div>
        <div class="kb-row">
            <button class="kbtn kmod" data-key="escape"><div class="klabel"><span class="ken">Esc</span></div></button>
            <button class="kbtn kmod" data-key="tab"><div class="klabel"><span class="ken">Tab</span></div></button>
            <button class="kbtn kmod" data-key="ctrl" id="kbCtrl1"><div class="klabel"><span class="ken">Ctrl</span></div></button>
            <button class="kbtn kmod" data-key="alt" id="kbAlt1"><div class="klabel"><span class="ken">Alt</span></div></button>
            <button class="kbtn kmod" data-key="shift" id="kbShift1"><div class="klabel"><span class="ken">Shift</span></div></button>
            <button class="kbtn-ru-toggle" id="btnRu">RU</button>
        </div>
        <div class="kb-row">
            <button class="kbtn" data-key="`"><div class="klabel"><span class="ken">` ~</span><span class="kru">ё</span></div></button>
            <button class="kbtn" data-key="1"><div class="klabel"><span class="ken">1 !</span><span class="kru">2 "</span></div></button>
            <button class="kbtn" data-key="2"><div class="klabel"><span class="ken">2 @</span><span class="kru">3 №</span></div></button>
            <button class="kbtn" data-key="3"><div class="klabel"><span class="ken">3 #</span><span class="kru">4 ;</span></div></button>
            <button class="kbtn" data-key="4"><div class="klabel"><span class="ken">4 $</span><span class="kru">5 %</span></div></button>
            <button class="kbtn" data-key="5"><div class="klabel"><span class="ken">5 %</span><span class="kru">6 :</span></div></button>
            <button class="kbtn" data-key="6"><div class="klabel"><span class="ken">6 ^</span><span class="kru">7 ?</span></div></button>
            <button class="kbtn" data-key="7"><div class="klabel"><span class="ken">7 &amp;</span><span class="kru">8 *</span></div></button>
            <button class="kbtn" data-key="8"><div class="klabel"><span class="ken">8 *</span><span class="kru">9 (</span></div></button>
            <button class="kbtn" data-key="9"><div class="klabel"><span class="ken">9 (</span><span class="kru">0 )</span></div></button>
            <button class="kbtn" data-key="0"><div class="klabel"><span class="ken">0 )</span><span class="kru">- _</span></div></button>
            <button class="kbtn" data-key="-"><div class="klabel"><span class="ken">- _</span><span class="kru">= +</span></div></button>
            <button class="kbtn" data-key="="><div class="klabel"><span class="ken">= +</span></div></button>
            <button class="kbtn kwide" data-key="backspace"><div class="klabel"><span class="ken">Backspace</span></div></button>
        </div>
        <div class="kb-row">
            <button class="kbtn kmod" data-key="tab"><div class="klabel"><span class="ken">Tab</span></div></button>
            <button class="kbtn" data-key="q"><div class="klabel"><span class="ken">Q</span><span class="kru">Й</span></div></button>
            <button class="kbtn" data-key="w"><div class="klabel"><span class="ken">W</span><span class="kru">Ц</span></div></button>
            <button class="kbtn" data-key="e"><div class="klabel"><span class="ken">E</span><span class="kru">У</span></div></button>
            <button class="kbtn" data-key="r"><div class="klabel"><span class="ken">R</span><span class="kru">К</span></div></button>
            <button class="kbtn" data-key="t"><div class="klabel"><span class="ken">T</span><span class="kru">Е</span></div></button>
            <button class="kbtn" data-key="y"><div class="klabel"><span class="ken">Y</span><span class="kru">Н</span></div></button>
            <button class="kbtn" data-key="u"><div class="klabel"><span class="ken">U</span><span class="kru">Г</span></div></button>
            <button class="kbtn" data-key="i"><div class="klabel"><span class="ken">I</span><span class="kru">Ш</span></div></button>
            <button class="kbtn" data-key="o"><div class="klabel"><span class="ken">O</span><span class="kru">Щ</span></div></button>
            <button class="kbtn" data-key="p"><div class="klabel"><span class="ken">P</span><span class="kru">З</span></div></button>
            <button class="kbtn" data-key="["><div class="klabel"><span class="ken">{ [</span><span class="kru">Х</span></div></button>
            <button class="kbtn" data-key="]"><div class="klabel"><span class="ken">} ]</span><span class="kru">Ъ</span></div></button>
            <button class="kbtn" data-key="\\"><div class="klabel"><span class="ken">| \</span></div></button>
        </div>
        <div class="kb-row">
            <button class="kbtn kmod" data-key="capslock"><div class="klabel"><span class="ken">Caps Lock</span></div></button>
            <button class="kbtn" data-key="a"><div class="klabel"><span class="ken">A</span><span class="kru">Ф</span></div></button>
            <button class="kbtn" data-key="s"><div class="klabel"><span class="ken">S</span><span class="kru">Ы</span></div></button>
            <button class="kbtn" data-key="d"><div class="klabel"><span class="ken">D</span><span class="kru">В</span></div></button>
            <button class="kbtn" data-key="f"><div class="klabel"><span class="ken">F</span><span class="kru">А</span></div></button>
            <button class="kbtn" data-key="g"><div class="klabel"><span class="ken">G</span><span class="kru">П</span></div></button>
            <button class="kbtn" data-key="h"><div class="klabel"><span class="ken">H</span><span class="kru">Р</span></div></button>
            <button class="kbtn" data-key="j"><div class="klabel"><span class="ken">J</span><span class="kru">О</span></div></button>
            <button class="kbtn" data-key="k"><div class="klabel"><span class="ken">K</span><span class="kru">Л</span></div></button>
            <button class="kbtn" data-key="l"><div class="klabel"><span class="ken">L</span><span class="kru">Д</span></div></button>
            <button class="kbtn" data-key=";"><div class="klabel"><span class="ken">; :</span><span class="kru">Ж</span></div></button>
            <button class="kbtn" data-key="'"><div class="klabel"><span class="ken">' "</span><span class="kru">Э</span></div></button>
            <button class="kbtn kwide" data-key="enter"><div class="klabel"><span class="ken">Enter</span></div></button>
        </div>
        <div class="kb-row">
            <button class="kbtn kmod" data-key="shift" id="kbShift2"><div class="klabel"><span class="ken">Shift</span></div></button>
            <button class="kbtn" data-key="z"><div class="klabel"><span class="ken">Z</span><span class="kru">Я</span></div></button>
            <button class="kbtn" data-key="x"><div class="klabel"><span class="ken">X</span><span class="kru">Ч</span></div></button>
            <button class="kbtn" data-key="c"><div class="klabel"><span class="ken">C</span><span class="kru">С</span></div></button>
            <button class="kbtn" data-key="v"><div class="klabel"><span class="ken">V</span><span class="kru">М</span></div></button>
            <button class="kbtn" data-key="b"><div class="klabel"><span class="ken">B</span><span class="kru">И</span></div></button>
            <button class="kbtn" data-key="n"><div class="klabel"><span class="ken">N</span><span class="kru">Т</span></div></button>
            <button class="kbtn" data-key="m"><div class="klabel"><span class="ken">M</span><span class="kru">Ь</span></div></button>
            <button class="kbtn" data-key=","><div class="klabel"><span class="ken">&lt; ,</span><span class="kru">Б</span></div></button>
            <button class="kbtn" data-key="."><div class="klabel"><span class="ken">&gt; .</span><span class="kru">Ю</span></div></button>
            <button class="kbtn" data-key="/"><div class="klabel"><span class="ken">? /</span></div></button>
            <button class="kbtn kmod" data-key="shift" id="kbShift3"><div class="klabel"><span class="ken">Shift</span></div></button>
        </div>
        <div class="kb-row">
            <button class="kbtn kmod" data-key="ctrl" id="kbCtrl2"><div class="klabel"><span class="ken">Ctrl</span></div></button>
            <button class="kbtn kmod" data-key="alt" id="kbAlt2"><div class="klabel"><span class="ken">Alt</span></div></button>
            <button class="kbtn kspace" data-key="space"><div class="klabel"><span class="ken">Пробел</span></div></button>
            <button class="kbtn kmod" data-key="alt" id="kbAlt3"><div class="klabel"><span class="ken">Alt</span></div></button>
            <button class="kbtn kmod" data-key="ctrl" id="kbCtrl3"><div class="klabel"><span class="ken">Ctrl</span></div></button>
            <button class="kbtn-arrow" data-key="left">◀</button>
            <button class="kbtn-arrow" data-key="down">▼</button>
            <button class="kbtn-arrow" data-key="up">▲</button>
            <button class="kbtn-arrow" data-key="right">▶</button>
        </div>
    </div>
</div>
<script src="script_http.js"></script>
</body>
</html>
